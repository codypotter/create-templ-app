name: CLI

on:
  push:
    branches: [main]
    paths:
      - "cmd/create-templ-app/**"
  pull_request:
    paths:
      - "cmd/create-templ-app/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cmd/create-templ-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: cmd/create-templ-app/go.mod

      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
