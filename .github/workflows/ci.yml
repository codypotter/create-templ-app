name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

      - run: npm ci
      - run: npm run build

      - name: Check templ-generated files are up to date
        run: |
          go tool templ generate
          git diff --exit-code -- '*_templ.go'
