name: Bug report
description: Something in the generator or scaffolded app isn't working right
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. go run github.com/codypotter/create-templ-app/cmd/create-templ-app@latest github.com/you/app
        2. ...
    validations:
      required: true
  - type: input
    id: go-version
    attributes:
      label: Go version
      placeholder: go version
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
    validations:
      required: false
