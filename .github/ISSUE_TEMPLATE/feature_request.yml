name: Feature request
description: Suggest a change to the generator or the default scaffolded app
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see instead?
    validations:
      required: true
